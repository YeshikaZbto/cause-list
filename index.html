<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zunheboto Cause List Portal (Simple Table View)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

th{
  background:#eee;
}

a{color:blue}
</style>
</head>

<body>

<h1>Zunheboto Cause List Portal</h1>

<div class="card">
<p>Simple table view (no upload, no storage)</p>
</div>

<h2>Available Cause Lists</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>PDF</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const SUPABASE_URL = "https://pxaggcmzbhmxfpuyaofk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4YWdnY216YmhteGZwdXlhb2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTIxMTUsImV4cCI6MjA5NjcyODExNX0.F_1Gv2gbucd89xkCPyi_MNBGfZeR3G-R93DAWdxxxmM";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.loadCauseLists = async function () {
  const { data, error } = await supabaseClient
    .from("cases")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan='3'>Error: ${error.message}</td></tr>`;
    return;
  }

  document.getElementById("tableBody").innerHTML = data
    .map(c => `
      <tr>
        <td>${c.id ?? "-"}</td>
        <td>${c.title ?? "-"}</td>
        <td>${c.pdf_url ? `<a href='${c.pdf_url}' target='_blank'>View PDF</a>` : "No file"}</td>
      </tr>
    `)
    .join("");
};

loadCauseLists();
</script>

</body>
</html>
