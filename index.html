<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zunheboto Cause List Portal test 6</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:20px;background:#f5f5f5}
.card,.case{background:#fff;padding:15px;border-radius:10px;margin-bottom:12px}
.hidden{display:none}
button,input{padding:10px;margin:5px}
a{color:blue}
</style>
</head>

<body>

<h1>Zunheboto Cause List Portal test 6</h1>

<div class="card">
<button onclick="showLogin()">Admin Login</button>
</div>

<div id="loginBox" class="card hidden">
<h3>Admin Login</h3>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="card hidden">
<h3>Upload PDF</h3>
<input id="title" placeholder="Title">
<input id="pdfFile" type="file" accept=".pdf">
<button onclick="uploadPDF()">Upload PDF</button>
<button onclick="logout()">Logout</button>
</div>

<h2>Available Cause Lists</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://pxaggcmzbhmxfpuyaofk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4YWdnY216YmhteGZwdXlhb2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTIxMTUsImV4cCI6MjA5NjcyODExNX0.F_1Gv2gbucd89xkCPyi_MNBGfZeR3G-R93DAWdxxxmM";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// LOGIN BOX
window.showLogin = function() {
  document.getElementById("loginBox").classList.remove("hidden");
};

// LOGIN
window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email, password
  });

  if (error) return alert(error.message);

  checkUser();
  loadCauseLists();
};

// LOGOUT
window.logout = async function() {
  await supabaseClient.auth.signOut();
  location.reload();
};

// CHECK USER
window.checkUser = async function() {
  const { data } = await supabaseClient.auth.getUser();
  if (data.user) {
    document.getElementById("adminPanel").classList.remove("hidden");
  }
};

// UPLOAD PDF (FIXED)
window.uploadPDF = async function () {
  const title = document.getElementById("title").value;
  const file = document.getElementById("pdfFile").files[0];

  if (!title || !file) {
    alert("Please enter title and select PDF file");
    return;
  }

  const fileName = Date.now() + "_" + file.name;

  // 1. Upload file to Supabase Storage
  const { error: uploadError } = await supabaseClient
    .storage
    .from("cases")
    .upload(fileName, file);

  if (uploadError) {
    alert("Upload failed: " + uploadError.message);
    return;
  }

  // 2. Get public URL
  const { data: urlData } = supabaseClient
    .storage
    .from("cases")
    .getPublicUrl(fileName);

  const pdfUrl = urlData.publicUrl;

  // 3. Save to database
  const { error: dbError } = await supabaseClient
    .from("cases")
    .insert([
      {
        title: title,
        pdf_url: pdfUrl
      }
    ]);

  if (dbError) {
    alert("Uploaded but DB error: " + dbError.message);
    return;
  }

  alert("PDF uploaded successfully!");
  loadCauseLists();
};

// LOAD LIST (FIXED)
window.loadCauseLists = async function () {
  const { data, error } = await supabaseClient
    .from("cases")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    document.getElementById("list").innerHTML =
      "<div class='case'>Error loading data</div>";
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById("list").innerHTML =
      "<div class='case'>No cause lists found</div>";
    return;
  }

  document.getElementById("list").innerHTML = data
    .map(c => `
      <div class="case">
        <h3>${c.title}</h3>
        <a href="${c.pdf_url}" target="_blank">View PDF</a>
      </div>
    `)
    .join("");
};

// INIT
checkUser();
loadCauseLists();
</script>

</body>
</html>
