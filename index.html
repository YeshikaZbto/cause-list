    window.exportPDF = function () {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Cause List Portal Report", 14, 10);

  const rows = [];

  document.querySelectorAll("#tableBody tr").forEach(tr => {
    const cols = tr.querySelectorAll("td");

    rows.push([
      cols[0]?.innerText,
      cols[1]?.innerText,
      cols[2]?.innerText,
      cols[3]?.innerText,
      cols[4]?.innerText,
      cols[5]?.innerText,
      cols[6]?.innerText,
      cols[7]?.innerText
    ]);
  });

  doc.autoTable({
    head: [[
      "Sl No",
      "Case No",
      "Section",
      "Accused",
      "Counsels",
      "Status",
      "Date",
      "District"
    ]],
    body: rows
  });

  doc.save("cause-list.pdf");
};

window.editRecord=(r)=>{

window.deleteRecord=async(id)=>{

 const {error}=await supabaseClient.from("cases").delete().eq("id",id);

 loadCases();
};

window.loadCases=async()=>{
// const {data,error}=await supabaseClient.from("cases").select("*").order("id",{ascending:false});  replaced for auto sort

    const {data,error}=await supabaseClient
.from("cases")
.select("*")
.order("district",{ascending:true})
.order("hearing_date",{ascending:true});

 if(error){
  tableBody.innerHTML=`<tr><td colspan="9">${error.message}</td></tr>`;
  return;
 }

 //const search=(document.getElementById("search").value||"").toLowerCase();
 //tableBody.innerHTML=data.filter(r=>JSON.stringify(r).toLowerCase().includes(search))
// for the search and the dropdown to add the load of districts
 const search = (document.getElementById("search").value || "").toLowerCase();
const districtFilter = document.getElementById("districtFilter").value;

tableBody.innerHTML = data
.filter(r => {
  const matchesSearch = JSON.stringify(r).toLowerCase().includes(search);
  const matchesDistrict = districtFilter === "" || r.district === districtFilter;
  return matchesSearch && matchesDistrict;
})
 //.map(r=>` removed for auto generate
    .map((r,index)=>`

 <td>
