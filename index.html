<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cause List Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,button{
    padding:10px;
    margin:5px;
}

button{
    cursor:pointer;
}

.hidden{
    display:none;
}

.case{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

a{
    text-decoration:none;
}
</style>
</head>
<body>

<h1>Cause List Portal</h1>

<div class="card">
<button onclick="showLogin()">Admin Login</button>
</div>

<div id="loginBox" class="card hidden">

<h3>Admin Login</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="adminPanel" class="card hidden">

<h3>Upload PDF</h3>

<input type="text" id="title" placeholder="Cause List Title">

<input type="file" id="pdfFile" accept=".pdf">

<button onclick="uploadPDF()">Upload PDF</button>

<button onclick="logout()">Logout</button>

</div>

<h2>Available Cause Lists</h2>

<div id="list"></div>

<script>

const SUPABASE_URL = "https://pxaggcmzbhmxfpuyaofk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4YWdnY216YmhteGZwdXlhb2ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTIxMTUsImV4cCI6MjA5NjcyODExNX0.F_1Gv2gbucd89xkCPyi_MNBGfZeR3G-R93DAWdxxxmM";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

window.showLogin = function () {
    document.getElementById("loginBox").classList.remove("hidden");
}

window.login = async function () {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        alert(error.message);
        return;
    }

    alert("Login successful");
    checkUser();
}

window.logout = async function () {
    await supabase.auth.signOut();
    location.reload();
}

window.checkUser = async function () {

    const { data } = await supabase.auth.getUser();

    if(data.user){
        document.getElementById("adminPanel")
        .classList.remove("hidden");
    }
}

window.uploadPDF = async function () {

    const file = document.getElementById("pdfFile").files[0];
    const title = document.getElementById("title").value;

    if(!file){
        alert("Select a PDF");
        return;
    }

    const fileName = Date.now() + "-" + file.name;

    const { error: uploadError } =
    await supabase.storage
    .from("cause-pdfs")
    .upload(fileName,file);

    if(uploadError){
        alert(uploadError.message);
        return;
    }

    const { data:urlData } =
    supabase.storage
    .from("cause-pdfs")
    .getPublicUrl(fileName);

    const pdf_url = urlData.publicUrl;

    const { error: dbError } =
    await supabase
    .from("cause_lists")
    .insert([
        {
            title:title,
            pdf_url:pdf_url
        }
    ]);

    if(dbError){
        alert(dbError.message);
        return;
    }

    alert("PDF Uploaded");
    loadCauseLists();
}

window.deleteCase = async function(id){

    if(!confirm("Delete this PDF?")){
        return;
    }

    const { error } =
    await supabase
    .from("cause_lists")
    .delete()
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    loadCauseLists();
}

window.loadCauseLists = async function(){

    const { data,error } =
    await supabase
    .from("cause_lists")
    .select("*")
    .order("id",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    const { data:userData } =
    await supabase.auth.getUser();

    const isAdmin = !!userData.user;

    let html = "";

    data.forEach(item=>{

        html += `
        <div class="case">

            <h3>${item.title}</h3>

            <a href="${item.pdf_url}" target="_blank">
                View PDF
            </a>

            ${isAdmin ?
            `<button onclick="deleteCase(${item.id})">
            Delete
            </button>`
            : ""
            }

        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

checkUser();
loadCauseLists();

</script>

</body>
</html>
