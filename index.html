<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cause List Portal Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1100px;margin:auto;padding:20px;background:#f5f5f5}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
.hidden{display:none}
input,select,button{padding:8px;margin:4px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
th{background:#eee}
</style>
</head>
<body>

<h1>Cause List Portal</h1>

<div class="card">
<button onclick="showLogin()">Admin Login</button>
</div>

<div id="loginBox" class="card hidden">
<h3>Admin Login</h3>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="card hidden">
<h3>Add / Edit Cause List</h3>

<input type="hidden" id="caseId">

<select id="district">
<option>Zunheboto</option>
<option>Dimapur</option>
<option>Kohima</option>
<option>Mokokchung</option>
<option>Tuensang</option>
<option>Mon</option>
<option>Wokha</option>
<option>Phek</option>
<option>Kiphire</option>
<option>Longleng</option>
<option>Peren</option>
<option>Noklak</option>
<option>Shamator</option>
<option>Chümoukedima</option>
<option>Niuland</option>
<option>Tseminyu</option>
</select>

<input id="title" placeholder="Title">
<input id="pdf_url" placeholder="PDF URL">

<button onclick="saveCase()">Save</button>
<button onclick="clearForm()">Clear</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<input id="search" placeholder="Search..." onkeyup="loadCases()">
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>District</th>
<th>Title</th>
<th>PDF</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
const SUPABASE_URL="YOUR_SUPABASE_URL";
const SUPABASE_KEY="YOUR_SUPABASE_ANON_KEY";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

window.showLogin=function(){
 document.getElementById("loginBox").classList.remove("hidden");
}

window.login=async function(){
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;

 const {error}=await supabaseClient.auth.signInWithPassword({email,password});

 if(error){ alert(error.message); return; }

 checkUser();
}

window.logout=async function(){
 await supabaseClient.auth.signOut();
 location.reload();
}

window.checkUser=async function(){
 const {data}=await supabaseClient.auth.getUser();
 if(data.user){
   document.getElementById("adminPanel").classList.remove("hidden");
 }
}

window.clearForm=function(){
 document.getElementById("caseId").value="";
 document.getElementById("title").value="";
 document.getElementById("pdf_url").value="";
}

window.saveCase=async function(){

 const id=document.getElementById("caseId").value;
 const district=document.getElementById("district").value;
 const title=document.getElementById("title").value;
 const pdf_url=document.getElementById("pdf_url").value;

 if(!title) return alert("Title required");

 let result;

 if(id){
   result=await supabaseClient
   .from("cases")
   .update({district,title,pdf_url})
   .eq("id",id);
 }else{
   result=await supabaseClient
   .from("cases")
   .insert([{district,title,pdf_url}]);
 }

 if(result.error){
   alert(result.error.message);
   return;
 }

 clearForm();
 loadCases();
}

window.editCase=function(c){
 document.getElementById("caseId").value=c.id;
 document.getElementById("district").value=c.district || "Zunheboto";
 document.getElementById("title").value=c.title || "";
 document.getElementById("pdf_url").value=c.pdf_url || "";
}

window.deleteCase=async function(id){
 if(!confirm("Delete this record?")) return;

 const {error}=await supabaseClient
 .from("cases")
 .delete()
 .eq("id",id);

 if(error){
   alert(error.message);
   return;
 }

 loadCases();
}

window.loadCases=async function(){

 const search=document.getElementById("search").value.toLowerCase();

 const {data,error}=await supabaseClient
 .from("cases")
 .select("*")
 .order("id",{ascending:false});

 if(error){
   document.getElementById("tableBody").innerHTML =
   "<tr><td colspan='5'>"+error.message+"</td></tr>";
   return;
 }

 const filtered=data.filter(x =>
   (x.title||"").toLowerCase().includes(search) ||
   (x.district||"").toLowerCase().includes(search)
 );

 document.getElementById("tableBody").innerHTML = filtered.map(c=>`
 <tr>
   <td>${c.id}</td>
   <td>${c.district||""}</td>
   <td>${c.title||""}</td>
   <td>${c.pdf_url ? `<a href="${c.pdf_url}" target="_blank">Open</a>` : ""}</td>
   <td>
      <button onclick='editCase(${JSON.stringify(c)})'>Edit</button>
      <button onclick='deleteCase(${c.id})'>Delete</button>
   </td>
 </tr>
 `).join("");
}

checkUser();
loadCases();
</script>

</body>
</html>
